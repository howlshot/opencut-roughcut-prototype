name: Rough-cut CI

concurrency:
  group: roughcut-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  roughcut:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: 1.2.18

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run rough-cut tests
        run: bun test apps/web/src/automation/roughcut

      - name: Check rough-cut CLI help
        run: |
          bun run generate:roughcut --help
          bun run render:roughcut --help
